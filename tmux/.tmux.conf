#
# Usage
#
## bash:
# `$ tma` => start or resume a session
# `$ tmk` => kill all sessions
# `$ tmclaude [name]` => open Claude in a tmux window (defaults name to current dir)
#
## tmux keybinds:
# Ctrl-Space => prefix
#
# <prefix> c => Create new window
# <prefix> n/p => Next/Previous window
# <prefix> , => Name window
# <prefix> Enter => Scratch terminal popup (80%, exits on shell exit)
# <prefix> W => Claude session dashboard (status + window switcher)
# <prefix> w => Built-in window/session tree picker
# <prefix> Tab => Toggle to last active window
#
# Ctrl h/j/k/l => navigate between panes
# <prefix> z => toggle fullscreen pane
# <prefix> [ => enter visual/scroll mode (vi controls)
# <prefix> v => Split pane vertically
# <prefix> s => Split pane horizontally
# Alt h/j/k/l => resize current pane
#
# <prefix> + Ctrl-s/Ctrl-r => save/restore session (resurrect plugin)
#
## Status bar indicators (per window, auto-refreshes):
# ● => Claude is working
# ○ => Claude is idle
# ? => Claude is waiting for input
# (blank) => not a Claude pane
#
## tmux commands
#
# <prefix> : => Enter command mode
# :display-popup => show popover modal
# :split-window -v
# :split-window -h
# :detach-client => exit tmux without killing the session
# :rename-window <new-name> => set name for tab
# :resize-pane -L n
# :resize-pane -U n
# :new-window
#


#
# General setup
#

set-option -g default-shell $BASH_PATH

# Vi-style
set-window-option -g mode-keys vi
set-option -g status-keys vi

set-option -g default-terminal "tmux-256color"

set-option -g history-limit 5000

set-option -g mouse on

set-option -s focus-events on

# Set prefix to Ctrl-Space
unbind C-b
set-option -g prefix C-Space

# faster command sequences
set-option -s escape-time 10

# Start numbering at 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Automatic names and numbers
set-window-option -g automatic-rename on
set-option -g renumber-windows on

# Display for a little longer
set-option -g display-panes-time 800
set-option -g display-time 1000

# Modifier key support for Ctrl/Alt/etc
# Note: Shift+Enter doesn't reach apps like Claude Code because tmux lacks
# kitty keyboard protocol support (tmux/tmux#4912). Use \ + Enter for now.
set -s extended-keys on

# Open terminal scratch session popup
bind-key Enter display-popup -d "#{pane_current_path}" -w 80% -h 80% -E -e IN_POPUP=1

# Claude session dashboard
bind-key W display-popup -w 50% -h 50% -E "~/.tmux/scripts/claude-dashboard.sh"

#
# Copy & Paste
#  - Use v and y to copy
#  - Escape to cancel
#

bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Platform-specific clipboard
set -s set-clipboard on
if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
} {
  bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
  bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
}


#
# Custom key bindings (vi style)
#
bind-key v split-window -h
bind-key s split-window -v

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Use Alt-vim keys without prefix key to resize panes
bind-key -n M-h resize-pane -L 2
bind-key -n M-j resize-pane -D 2
bind-key -n M-k resize-pane -U 2
bind-key -n M-l resize-pane -R 2

# Reload configuration
bind-key r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# Move to last active window
bind-key Tab last-window


#
# Styling (Solarized dark)
#

# Status bar
set-option -g status-left ''
set-option -g status-right-length 60
set-option -g status-right '%Y-%m-%d %H:%M'

set-option -g status-style bg=black,fg=default,default

# Window title colors
set-window-option -g window-status-style fg=brightblue,bg=default
set-window-option -g window-status-format " #I #W #(~/.tmux/scripts/claude-status.sh #{pane_id})"

set-window-option -g window-status-current-style fg=black,bg=blue
set-window-option -g window-status-current-format "#[bg=default]#[fg=black] #I #[fg=black]#[bg=blue] #W #(~/.tmux/scripts/claude-status.sh #{pane_id})"

set-window-option -g window-status-last-style bg=default,fg=blue,none

# Pane border
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=brightgreen
set -wg pane-border-lines heavy

# Message text
set-option -g message-style bg=black,fg=brightred

# Pane number display
set-option -g display-panes-active-colour blue
set-option -g display-panes-colour brightred

# Always show scrollbar (modal causes content shift on copy-mode entry)
set -g pane-scrollbars on

# Clock
set-window-option -g clock-mode-colour green

# Bell
set-window-option -g window-status-bell-style fg=black,bg=red


#
# Plugins
#

run-shell ~/.tmux/plugins/resurrect/resurrect.tmux
